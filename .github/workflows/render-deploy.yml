name: Render Deploy

# Render auto-deploy webhook ba'zan ishlamaydi (account permissions, GitHub
# integration timeout va h.k.). Bu workflow ishonchli alternativa: har
# push to main paytida Render API ga to'g'ridan-to'g'ri deploy trigger
# yuboradi va backend + frontend ikkalasini ham yangilaydi.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger backend deploy (olympy-api) and poll status
        env:
          RENDER_TOKEN: ${{ secrets.RENDER_API_TOKEN }}
        run: |
          if [ -z "$RENDER_TOKEN" ]; then
            echo "::error::RENDER_API_TOKEN secret yo'q. Settings → Secrets → Actions ga qo'shing."
            exit 1
          fi
          
          # Trigger deploy with retry for rate limits
          DEPLOY_ID=""
          for i in {1..5}; do
            HTTP_STATUS=$(curl -s -o /tmp/resp.json -w "%{http_code}" -X POST \
              -H "Authorization: Bearer $RENDER_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"clearCache":"do_not_clear"}' \
              "https://api.render.com/v1/services/srv-d7t49iq8qa3s73f76qag/deploys")
            echo "HTTP Status: $HTTP_STATUS"
            RESPONSE=$(cat /tmp/resp.json)
            echo "Response body: $RESPONSE"
            
            DEPLOY_ID=$(echo "$RESPONSE" | jq -r '.id // empty')
            if [ -z "$DEPLOY_ID" ] || [ "$DEPLOY_ID" = "null" ]; then
              if [ "$HTTP_STATUS" = "202" ] || [ "$HTTP_STATUS" = "200" ]; then
                echo "Deploy accepted. Fetching latest deploy ID from list..."
                sleep 5
                DEPLOY_ID=$(curl -sS -H "Authorization: Bearer $RENDER_TOKEN" \
                  "https://api.render.com/v1/services/srv-d7t49iq8qa3s73f76qag/deploys?limit=1" | jq -r '.[0].deploy.id // empty')
              fi
            fi
            
            if [ -n "$DEPLOY_ID" ] && [ "$DEPLOY_ID" != "null" ]; then
              break
            fi
            echo "Trigger failed or rate-limited. Retrying in 15 seconds..."
            sleep 15
          done
          
          if [ -z "$DEPLOY_ID" ] || [ "$DEPLOY_ID" = "null" ]; then
            echo "::error::Failed to trigger deploy after retries."
            exit 1
          fi
          
          echo "Backend deploy triggered. ID: $DEPLOY_ID"
          
          # Poll status
          while true; do
            STATUS_RESP=$(curl -fsS -H "Authorization: Bearer $RENDER_TOKEN" \
              "https://api.render.com/v1/services/srv-d7t49iq8qa3s73f76qag/deploys/$DEPLOY_ID")
            STATUS=$(echo "$STATUS_RESP" | jq -r '.status')
            echo "Deploy status: $STATUS"
            if [ "$STATUS" = "live" ]; then
              echo "Deploy succeeded!"
              break
            elif [ "$STATUS" = "build_failed" ] || [ "$STATUS" = "pre_deploy_failed" ] || [ "$STATUS" = "deactivated" ] || [ "$STATUS" = "canceled" ]; then
              echo "::error::Deploy failed with status: $STATUS"
              echo "Full response: $STATUS_RESP"
              echo "=== FETCHING BUILD LOGS ==="
              OWNER_ID=$(curl -sS -H "Authorization: Bearer $RENDER_TOKEN" "https://api.render.com/v1/owners" | jq -r '.[0].owner.id')
              echo "Owner ID: $OWNER_ID"
              curl -sS -H "Authorization: Bearer $RENDER_TOKEN" \
                "https://api.render.com/v1/logs?resource=srv-d7t49iq8qa3s73f76qag&ownerId=$OWNER_ID&type=build&limit=300" | jq -r '.logs[] | .message // .text // .' | tac || echo "Failed to fetch logs"

              exit 1
            fi
            sleep 15
          done



      - name: Trigger frontend deploy (olympy)
        env:
          RENDER_TOKEN: ${{ secrets.RENDER_API_TOKEN }}
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer $RENDER_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":"do_not_clear"}' \
            "https://api.render.com/v1/services/srv-d7t4avog4nts73edsbr0/deploys" \
            | tee /tmp/frontend_deploy.json
          echo "Frontend deploy id: $(jq -r '.id' < /tmp/frontend_deploy.json)"
