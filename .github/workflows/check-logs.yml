name: Check Render Logs
on:
  workflow_dispatch: {}

jobs:
  logs:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch and print Render build logs
        env:
          RENDER_TOKEN: ${{ secrets.RENDER_API_TOKEN }}
        run: |
          if [ -z "$RENDER_TOKEN" ]; then
            echo "::error::RENDER_API_TOKEN is missing."
            exit 1
          fi
          OWNER_ID=$(curl -sS -H "Authorization: Bearer $RENDER_TOKEN" "https://api.render.com/v1/owners" | jq -r '.[0].owner.id')
          echo "Owner ID: $OWNER_ID"
          
          # Fetch and print build logs
          curl -sS -H "Authorization: Bearer $RENDER_TOKEN" \
            "https://api.render.com/v1/logs?resource=srv-d7t49iq8qa3s73f76qag&ownerId=$OWNER_ID&type=build&limit=150" | jq -r '.[] | .message' | tac
