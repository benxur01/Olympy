services:
  # ── Frontend (React/Vite static site) ─────────────────────────────────────
  - type: static_site
    name: olympy
    repo: https://github.com/benxur01/Olympy
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false
    envVars:
      # Frontend Sentry DSN — Vite build paytida o'qiladi (VITE_ prefiks).
      # Bo'sh bo'lsa Sentry init o'tkazib yuboriladi (graceful fallback).
      - key: VITE_SENTRY_DSN
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # ── Backend API (Django + Gunicorn) ────────────────────────────────────────
  - type: web_service
    name: olympy-api
    repo: https://github.com/benxur01/Olympy
    rootDir: backend
    env: python
    region: ohio
    plan: standard
    branch: main
    buildCommand: ./render_build.sh
    startCommand: ./render_start.sh
    # Media fayllar Cloudinary'ga ko'chirildi (CLOUDINARY_* env var'lar) —
    # endi disk dependency'si yo'q va servis horizontal scale qilinishi
    # mumkin. numInstances'ni 2+ ga oshirish uchun disk bo'limi olib
    # tashlandi. DIQQAT: disk olib tashlangach, eski (Cloudinary'gacha
    # yuklangan) media fayllar Render diskidan yo'qoladi — yangi yuklamalar
    # Cloudinary'da saqlanadi.
    numInstances: 1
    healthCheckPath: /api/health/
    # Uptime monitoring: UptimeRobot (uptimerobot.com) da bepul monitor yarating
    # URL: https://prolymp.uz/api/health/ — 5 daqiqada bir tekshiradi
    # Alert: Telegram yoki email orqali xabar beradi
    envVars:
      - key: REDIS_URL
        sync: false
      - key: CELERY_BROKER_URL
        sync: false
      - key: CELERY_RESULT_BACKEND_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: OLYMPY_SECRET_KEY
        sync: false
      - key: OLYMPY_ALLOWED_HOSTS
        sync: false
      - key: OLYMPY_CORS_ALLOWED_ORIGINS
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: TELEGRAM_AUTH_BOT_TOKEN
        sync: false
      - key: TELEGRAM_MANAGER_BOT_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      # Judge0 kod runner ("Ishga tushirish"). JUDGE0_URL bo'sh bo'lsa public CE
      # API (ce.judge0.com) ishlatiladi; JUDGE0_API_KEY berilsa RapidAPI Judge0
      # CE (ko'proq limit). Ikkalasi ham ixtiyoriy.
      - key: JUDGE0_URL
        sync: false
      - key: JUDGE0_API_KEY
        sync: false
      # Sentry backend DSN — bo'sh bo'lsa monitoring o'chiq qoladi.
      - key: SENTRY_DSN
        sync: false
      # Email — MAILGUN_API_KEY o'rnatilsa Mailgun backend yoqiladi, aks holda
      # console backend (email yuborilmaydi). Barchasi ixtiyoriy.
      - key: EMAIL_BACKEND
        sync: false
      - key: MAILGUN_API_KEY
        sync: false
      - key: MAILGUN_SENDER_DOMAIN
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
      # To'lov provayderlari (Click va Payme) — webhook'lar shu web service'da
      # qayta ishlanadi. Qiymatlar maxfiy, Render dashboard'da qo'lda kiritiladi.
      - key: CLICK_SERVICE_ID
        sync: false
      - key: CLICK_MERCHANT_ID
        sync: false
      - key: CLICK_SECRET_KEY
        sync: false
      - key: PAYME_MERCHANT_ID
        sync: false
      - key: PAYME_SECRET_KEY
        sync: false

  # ── Celery Background Worker ────────────────────────────────────────────────
  - type: background_worker
    name: olympy-celery-worker
    repo: https://github.com/benxur01/Olympy
    rootDir: backend
    env: python
    region: ohio
    plan: starter
    branch: main
    buildCommand: pip install --no-cache-dir -r requirements.txt
    startCommand: celery -A olympy_api worker -l info -c 2
    numInstances: 1
    envVars:
      - key: REDIS_URL
        sync: false
      - key: CELERY_BROKER_URL
        sync: false
      - key: CELERY_RESULT_BACKEND_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: OLYMPY_SECRET_KEY
        sync: false
      # Cloudinary — USE_CLOUDINARY env mavjudligiga qarab INSTALLED_APPS va
      # STORAGES'ni belgilaydi. Worker web service bilan bir xil storage
      # backend'ga ega bo'lishi shart (model media maydonlari izchil ishlashi
      # uchun); aks holda worker FileSystemStorage'ga tushib qoladi.
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      # Judge0 kod runner — kodni ishga tushirish Celery task'i shu worker'da
      # bajariladi, shuning uchun web service bilan bir xil qo'shamiz (aks holda
      # worker public CE API'ga tushib qoladi yoki API key'siz ishlaydi).
      - key: JUDGE0_URL
        sync: false
      - key: JUDGE0_API_KEY
        sync: false
      - key: TELEGRAM_AUTH_BOT_TOKEN
        sync: false
      - key: TELEGRAM_MANAGER_BOT_TOKEN
        sync: false
      # Sentry backend DSN — bo'sh bo'lsa monitoring o'chiq qoladi. Worker'da
      # task xatolari ham kuzatilishi uchun web service bilan bir xil qo'shamiz.
      - key: SENTRY_DSN
        sync: false
      # Email — natija xabarlari shu worker'da yuboriladi (Mailgun yoqilgan
      # bo'lsa). Barchasi ixtiyoriy.
      - key: EMAIL_BACKEND
        sync: false
      - key: MAILGUN_API_KEY
        sync: false
      - key: MAILGUN_SENDER_DOMAIN
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false

  # ── Celery Beat Scheduler ───────────────────────────────────────────────────
  # Faqat bitta instance — scheduler takrorlanmasin.
  - type: background_worker
    name: olympy-celery-beat
    repo: https://github.com/benxur01/Olympy
    rootDir: backend
    env: python
    region: ohio
    plan: starter
    branch: main
    buildCommand: pip install --no-cache-dir -r requirements.txt
    startCommand: celery -A olympy_api beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    numInstances: 1
    envVars:
      - key: REDIS_URL
        sync: false
      - key: CELERY_BROKER_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: OLYMPY_SECRET_KEY
        sync: false
      # Cloudinary — Django sozlamalari beat jarayonida ham to'liq yuklanadi
      # (DatabaseScheduler model importlari). INSTALLED_APPS/STORAGES web va
      # worker bilan izchil bo'lishi uchun bir xil qo'shamiz.
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      # Sentry backend DSN — beat scheduler xatolari ham kuzatilishi uchun.
      - key: SENTRY_DSN
        sync: false

# Database va Redis allaqachon Render dashboard'da yaratilgan.
# render.yaml faqat service konfiguratsiyasini tavsiflab beradi —
# mavjud resurslar saqlanib qoladi, qayta yaratilmaydi.
