services:
  # ── Frontend (React/Vite static site) ─────────────────────────────────────
  - type: static_site
    name: olympy
    repo: https://github.com/benxur01/Olympy
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # ── Backend API (Django + Gunicorn) ────────────────────────────────────────
  - type: web_service
    name: olympy-api
    repo: https://github.com/benxur01/Olympy
    rootDir: backend
    env: python
    region: ohio
    plan: standard
    branch: main
    buildCommand: ./render_build.sh
    startCommand: ./render_start.sh
    # DIQQAT: Disk-mounted servisni Render horizontal scale qilmaydi
    # (Scalable disk-backed services early access talab qilinadi).
    # Media fayllarni Cloudinary'ga ko'chirilgandan keyin disk olib
    # tashlanib, numInstances: 2+ qo'yish mumkin bo'ladi.
    # Hozircha 1 instance — Gunicorn ichidagi 4 worker + 2 thread
    # (8 parallel so'rov) yetarli. Katta load uchun Cloudinary + disk olib
    # tashlash kerak.
    numInstances: 1
    healthCheckPath: /api/health/
    disk:
      name: olympy-media-disk
      mountPath: /opt/render/project/src/backend/media
      sizeGB: 5
    envVars:
      - key: REDIS_URL
        sync: false
      - key: CELERY_BROKER_URL
        sync: false
      - key: CELERY_RESULT_BACKEND_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: OLYMPY_SECRET_KEY
        sync: false
      - key: OLYMPY_ALLOWED_HOSTS
        sync: false
      - key: OLYMPY_CORS_ALLOWED_ORIGINS
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: TELEGRAM_AUTH_BOT_TOKEN
        sync: false
      - key: TELEGRAM_MANAGER_BOT_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false

  # ── Celery Background Worker ────────────────────────────────────────────────
  - type: background_worker
    name: olympy-celery-worker
    repo: https://github.com/benxur01/Olympy
    rootDir: backend
    env: python
    region: ohio
    plan: starter
    branch: main
    buildCommand: pip install --no-cache-dir -r requirements.txt
    startCommand: celery -A olympy_api worker -l info -c 2
    numInstances: 1
    envVars:
      - key: REDIS_URL
        sync: false
      - key: CELERY_BROKER_URL
        sync: false
      - key: CELERY_RESULT_BACKEND_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: OLYMPY_SECRET_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: TELEGRAM_AUTH_BOT_TOKEN
        sync: false
      - key: TELEGRAM_MANAGER_BOT_TOKEN
        sync: false

  # ── Celery Beat Scheduler ───────────────────────────────────────────────────
  # Faqat bitta instance — scheduler takrorlanmasin.
  - type: background_worker
    name: olympy-celery-beat
    repo: https://github.com/benxur01/Olympy
    rootDir: backend
    env: python
    region: ohio
    plan: starter
    branch: main
    buildCommand: pip install --no-cache-dir -r requirements.txt
    startCommand: celery -A olympy_api beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    numInstances: 1
    envVars:
      - key: REDIS_URL
        sync: false
      - key: CELERY_BROKER_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: OLYMPY_SECRET_KEY
        sync: false

# Database va Redis allaqachon Render dashboard'da yaratilgan.
# render.yaml faqat service konfiguratsiyasini tavsiflab beradi —
# mavjud resurslar saqlanib qoladi, qayta yaratilmaydi.
