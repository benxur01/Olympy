<!DOCTYPE html>
<html lang="uz" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pro Olimp — Online Olimpiada Platformasi</title>
  <meta name="theme-color" content="#060818" />
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16x16.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
          colors: {
            brand: {
              50: '#eef2ff', 100: '#e0e7ff', 200: '#c7d2fe',
              300: '#a5b4fc', 400: '#818cf8', 500: '#6366f1',
              600: '#4f46e5', 700: '#4338ca', 800: '#3730a3', 900: '#312e81',
            },
            surface: {
              900: '#060818', 800: '#0d0f23', 700: '#12152e',
              600: '#181b36', 500: '#1e2240',
            }
          },
          animation: {
            'fade-in': 'fadeIn 0.5s ease forwards',
            'slide-up': 'slideUp 0.4s ease forwards',
            'pulse-slow': 'pulse 3s infinite',
            'float': 'float 6s ease-in-out infinite',
            'gradient': 'gradient 8s ease infinite',
          },
          keyframes: {
            fadeIn: { from: { opacity: 0 }, to: { opacity: 1 } },
            slideUp: { from: { opacity: 0, transform: 'translateY(20px)' }, to: { opacity: 1, transform: 'translateY(0)' } },
            float: { '0%,100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-12px)' } },
            gradient: { '0%,100%': { backgroundPosition: '0% 50%' }, '50%': { backgroundPosition: '100% 50%' } },
          }
        }
      }
    };
  </script>
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #060818; color: #fff; margin: 0; overflow-x: hidden; }
    ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #0d0f23; } ::-webkit-scrollbar-thumb { background: #4338ca; border-radius: 3px; }
    .glass { background: rgba(255,255,255,0.04); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); }
    .glass-strong { background: rgba(255,255,255,0.07); backdrop-filter: blur(30px); border: 1px solid rgba(255,255,255,0.12); }
    .glow-blue { box-shadow: 0 0 30px rgba(99,102,241,0.3); }
    .glow-purple { box-shadow: 0 0 30px rgba(168,85,247,0.25); }
    .glow-cyan { box-shadow: 0 0 30px rgba(34,211,238,0.2); }
    .gradient-text { background: linear-gradient(135deg, #6366f1 0%, #a855f7 50%, #22d3ee 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .gradient-bg { background: linear-gradient(135deg, #6366f1 0%, #a855f7 50%, #22d3ee 100%); background-size: 200% 200%; animation: gradient 8s ease infinite; }
    .card-hover { transition: all 0.3s ease; } .card-hover:hover { transform: translateY(-3px); box-shadow: 0 20px 60px rgba(99,102,241,0.2); }
    .sidebar-item { transition: all 0.2s ease; }
    .sidebar-item.active { background: rgba(99,102,241,0.15); border-left: 2px solid #6366f1; }
    .sidebar-item:hover { background: rgba(255,255,255,0.06); }
    .badge-pending { background: rgba(251,191,36,0.15); color: #fbbf24; border: 1px solid rgba(251,191,36,0.3); }
    .badge-approved { background: rgba(34,197,94,0.15); color: #22c55e; border: 1px solid rgba(34,197,94,0.3); }
    .badge-rejected { background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }
    .badge-active { background: rgba(34,211,238,0.15); color: #22d3ee; border: 1px solid rgba(34,211,238,0.3); }
    .badge-draft { background: rgba(148,163,184,0.15); color: #94a3b8; border: 1px solid rgba(148,163,184,0.3); }
    .btn-primary { background: linear-gradient(135deg, #6366f1, #a855f7); color: white; border: none; cursor: pointer; transition: all 0.3s; }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 10px 30px rgba(99,102,241,0.4); }
    .btn-ghost { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.8); border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: all 0.2s; }
    .btn-ghost:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); }
    .btn-danger { background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); cursor: pointer; transition: all 0.2s; }
    .btn-danger:hover { background: rgba(239,68,68,0.25); }
    .btn-success { background: rgba(34,197,94,0.15); color: #22c55e; border: 1px solid rgba(34,197,94,0.3); cursor: pointer; transition: all 0.2s; }
    .btn-success:hover { background: rgba(34,197,94,0.25); }
    .input-field { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 10px; padding: 12px 16px; width: 100%; transition: all 0.2s; }
    .input-field:focus { outline: none; border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.15); }
    .input-field::placeholder { color: rgba(255,255,255,0.3); }
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 50; display: flex; align-items: center; justify-content: center; animation: fadeIn 0.2s ease; }
    .modal { background: #12152e; border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 32px; max-width: 520px; width: 90%; animation: slideUp 0.3s ease; }
    .stat-card { position: relative; overflow: hidden; }
    .stat-card::before { content: ''; position: absolute; top: -50%; right: -30%; width: 120px; height: 120px; border-radius: 50%; opacity: 0.1; filter: blur(30px); }
    .table-row { border-bottom: 1px solid rgba(255,255,255,0.05); transition: background 0.15s; }
    .table-row:hover { background: rgba(255,255,255,0.03); }
    .progress-bar { background: rgba(255,255,255,0.1); border-radius: 99px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, #6366f1, #a855f7); transition: width 0.8s ease; }
    .nav-tabs { border-bottom: 1px solid rgba(255,255,255,0.08); }
    .nav-tab { padding: 10px 18px; cursor: pointer; color: rgba(255,255,255,0.5); border-bottom: 2px solid transparent; transition: all 0.2s; font-size: 14px; }
    .nav-tab.active { color: white; border-bottom-color: #6366f1; }
    .nav-tab:hover { color: rgba(255,255,255,0.8); }
    .orbit { position: absolute; border-radius: 50%; border: 1px solid rgba(99,102,241,0.15); animation: spin 20s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .hero-glow { position: absolute; width: 600px; height: 600px; border-radius: 50%; filter: blur(120px); opacity: 0.15; pointer-events: none; }
    .feature-icon { width: 48px; height: 48px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
    select.input-field option { background: #12152e; }
    .question-nav-btn { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); transition: all 0.2s; }
    .question-nav-btn.answered { background: rgba(99,102,241,0.3); border-color: #6366f1; color: white; }
    .question-nav-btn.marked { background: rgba(251,191,36,0.2); border-color: #fbbf24; color: #fbbf24; }
    .question-nav-btn.current { border-color: white; background: rgba(255,255,255,0.1); }
    .animate-in { animation: slideUp 0.5s ease forwards; }

    /* Desktop sidebar — hidden below lg (1024px) */
    @media (max-width: 1023px) { .sidebar-desktop { display: none !important; } }

    .leaderboard-gold { background: linear-gradient(135deg, rgba(251,191,36,0.1), rgba(245,158,11,0.05)); border: 1px solid rgba(251,191,36,0.3); }
    .leaderboard-silver { background: linear-gradient(135deg, rgba(148,163,184,0.1), rgba(100,116,139,0.05)); border: 1px solid rgba(148,163,184,0.3); }
    .leaderboard-bronze { background: linear-gradient(135deg, rgba(180,83,9,0.1), rgba(146,64,14,0.05)); border: 1px solid rgba(180,83,9,0.3); }
    .chip { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 99px; font-size: 12px; font-weight: 500; }
    .donut-ring { transition: stroke-dashoffset 1s ease; }
    textarea.input-field { resize: vertical; min-height: 100px; }
    .ai-shimmer { background: linear-gradient(90deg, rgba(99,102,241,0.1) 25%, rgba(168,85,247,0.2) 50%, rgba(99,102,241,0.1) 75%); background-size: 200% 100%; animation: shimmer 2s infinite; }
    @keyframes shimmer { from { background-position: 200% 0; } to { background-position: -200% 0; } }

    /* ── Mobile drawer ───────────────────────────────────────── */
    .mobile-drawer-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.65); backdrop-filter: blur(4px); z-index: 60; animation: fadeIn 0.2s ease; }
    .mobile-drawer { position: fixed; top: 0; left: 0; bottom: 0; width: 280px; z-index: 61; display: flex; flex-direction: column; background: rgba(6,8,24,0.98); border-right: 1px solid rgba(255,255,255,0.07); animation: drawerIn 0.28s cubic-bezier(0.32,0.72,0,1); overflow-y: auto; }
    @keyframes drawerIn { from { transform: translateX(-100%); } to { transform: translateX(0); } }

    /* ── Mobile bottom nav ───────────────────────────────────── */
    .mobile-bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; z-index: 40; background: rgba(6,8,24,0.97); border-top: 1px solid rgba(255,255,255,0.07); backdrop-filter: blur(20px); display: flex; padding-bottom: env(safe-area-inset-bottom); }
    .mobile-bottom-nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 8px 4px 10px; gap: 3px; cursor: pointer; border: none; background: transparent; transition: all 0.15s; -webkit-tap-highlight-color: transparent; }
    .mobile-bottom-nav-item span.label { font-size: 10px; font-weight: 600; letter-spacing: 0.01em; }
    .mobile-bottom-nav-item.active { color: #818cf8; }
    .mobile-bottom-nav-item:not(.active) { color: rgba(255,255,255,0.3); }

    /* ── Mobile modal → bottom sheet ────────────────────────── */
    @media (max-width: 1023px) {
      .overlay { align-items: flex-end; padding: 0; }
      .modal {
        border-radius: 20px 20px 0 0 !important;
        max-width: 100% !important;
        width: 100% !important;
        margin: 0 !important;
        padding: 24px 20px 32px !important;
        max-height: 90vh;
        overflow-y: auto;
        animation: sheetUp 0.32s cubic-bezier(0.32,0.72,0,1) !important;
      }
      @keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    }

    /* ── Mobile content padding (above bottom nav) ───────────── */
    .mobile-content-pad { padding-bottom: 80px; }
    @media (min-width: 1024px) { .mobile-content-pad { padding-bottom: 0; } }

    /* ── Mobile card-table (replaces <table> on small screens) ── */
    .mobile-card-row { display: flex; flex-direction: column; gap: 0; }
    .mobile-card-item { padding: 14px 16px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .mobile-card-item:last-child { border-bottom: none; }

    /* ── Mobile test — question strip ───────────────────────── */
    .question-strip { display: flex; gap: 6px; overflow-x: auto; padding: 10px 16px; scrollbar-width: none; }
    .question-strip::-webkit-scrollbar { display: none; }
    .question-strip-btn { width: 32px; height: 32px; border-radius: 8px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; border: 1px solid rgba(255,255,255,0.12); background: transparent; color: rgba(255,255,255,0.4); cursor: pointer; transition: all 0.15s; }
    .question-strip-btn.answered { background: rgba(99,102,241,0.35); border-color: #6366f1; color: white; }
    .question-strip-btn.marked { background: rgba(251,191,36,0.2); border-color: #fbbf24; color: #fbbf24; }
    .question-strip-btn.current { border-color: white; background: rgba(255,255,255,0.12); color: white; }

    /* ── Touch-friendly tap targets ─────────────────────────── */
    @media (max-width: 1023px) {
      .input-field { font-size: 16px; } /* prevents iOS zoom */
      .btn-primary, .btn-ghost, .btn-danger, .btn-success { min-height: 44px; }
    }
  </style>
</head>
